  coverage:
    name: Code Coverage
    runs-on: [self-hosted, linux, kseed-docker1]
    needs: [integration-test]
    defaults:
      run:
        shell: bash
        working-directory: repo
    container:
      image: python:3.11-bookworm
      options: --user 1103:1103
    env:
      HOME: ${{ github.workspace }}/.home
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: repo
    
    - name: Install dependencies
      run: |
        mkdir -p "$HOME" "$PIP_CACHE_DIR"
        python -m venv .venv
        ./.venv/bin/python -m pip install --upgrade pip
        ./.venv/bin/python -m pip install pytest pytest-cov
        ./.venv/bin/python -m pip install -r requirements.txt
    
    - name: Run tests with coverage
      env:
        PYTHONPATH: .
      run: |
        ./.venv/bin/python -m pytest tests/ --cov=tm1_git_py --cov-report=xml --cov-report=html --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./repo/coverage.xml
        fail_ci_if_error: false
      continue-on-error: true
    
    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: repo/htmlcov/
        retention-days: 7
