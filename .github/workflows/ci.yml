name: CI

on:
  #push:
  #  branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }} (ubuntu)
    runs-on: ubuntu-latest
    container:
      image: python:${{ matrix.python-version }}-bookworm
      #options: --user 1103:1103
    env:
      HOME: ${{ github.workspace }}/.home
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt
    
    - name: Run tests
      env:
        PYTHONPATH: .
      run: python -m pytest tests/ -v --tb=short
    
    - name: Test import
      run: |
        python -c "from tm1_git_py.config import load_tm1_servers; print('Import successful')"
    

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Set up WireGuard
      uses: egor-tensin/setup-wireguard@v1
      with:
        endpoint: 80.77.112.226:55000
        endpoint_public_key: ${{ secrets.PFSENSE_PUBLIC_KEY }}
        ips: 192.168.124.22/24
        allowed_ips: 192.168.124.0/24, 192.168.123.0/24
        private_key: ${{ secrets.ENDPOINT_GITHUB_PRIVATE_KEY }}

    - name: Update resolv.conf
      run: |
        echo "nameserver 192.168.123.2" | sudo tee /etc/resolv.conf > /dev/null
        echo "nameserver 8.8.8.8" | sudo tee -a /etc/resolv.conf > /dev/null
        echo "search knowledgeseed.local" | sudo tee -a /etc/resolv.conf > /dev/null

    - name: Set up Docker with insecure registry
      run: |
        echo '{"insecure-registries": ["kseed-docker1.knowledgeseed.local:3000"]}' | sudo tee /etc/docker/daemon.json
        sudo systemctl restart docker

    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt
    
    - name: Run integration tests
      env:
        PYTHONPATH: .
        FORCE_CONTAINER_START: 'true'
      run: python -m pytest test_integration/ -v --tb=short

  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    container:
      image: python:3.11-bookworm
      options: --user 1103:1103
    env:
      HOME: ${{ github.workspace }}/.home
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 black isort mypy
        python -m pip install -r requirements.txt
    
    - name: Run flake8
      run: |
        python -m flake8 tm1_git_py/ --count --select=E9,F63,F7,F82 --show-source --statistics
        python -m flake8 tm1_git_py/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Check code formatting with black
      run: |
        python -m black --check tm1_git_py/
      continue-on-error: true
    
    - name: Check import sorting with isort
      run: |
        python -m isort --check-only tm1_git_py/
      continue-on-error: true
    

  build:
    name: Build Package
    runs-on: ubuntu-latest
    container:
      image: python:3.11-bookworm
      options: --user 1103:1103
    env:
      HOME: ${{ github.workspace }}/.home
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    needs: [test, integration-test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build setuptools wheel
    
    - name: Build package
      run: |
        python -m build
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
        retention-days: 7
    

