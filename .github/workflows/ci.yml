name: CI

on:
  #push:
  #  branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }} (ubuntu)
    runs-on: [self-hosted, linux, kseed-docker1]
    defaults:
      run:
        shell: bash
        working-directory: repo
    container:
      image: python:${{ matrix.python-version }}-bookworm
      options: --user 1103:1103
    env:
      HOME: ${{ github.workspace }}/.home
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: repo
    
    - name: Prepare venv and install dependencies
      run: |
        mkdir -p "$HOME" "$PIP_CACHE_DIR"
        python -m venv .venv
        ./.venv/bin/python -m pip install --upgrade pip
        ./.venv/bin/python -m pip install -r requirements.txt
    
    - name: Run tests
      env:
        PYTHONPATH: .
      run: ./.venv/bin/python -m pytest tests/ -v --tb=short
    
    - name: Test import
      run: |
        ./.venv/bin/python -c "from tm1_git_py.config import load_tm1_servers; print('Import successful')"

  integration-test:
    name: Integration Tests
    runs-on: kseed-docker1
    defaults:
      run:
        shell: bash
        working-directory: repo
    env:
      HOME: ${{ github.workspace }}/.home
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: repo
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        mkdir -p "$HOME" "$PIP_CACHE_DIR"
        python -m venv .venv
        ./.venv/bin/python -m pip install --upgrade pip
        ./.venv/bin/python -m pip install -r requirements.txt
        ./.venv/bin/python -m pip install pytest testcontainers
    
    - name: Run integration tests
      env:
        PYTHONPATH: .
        FORCE_CONTAINER_START: 'true'
      run: ./.venv/bin/python -m pytest test_integration/ -v --tb=short

  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
        pip install -r requirements.txt
    
    - name: Run flake8
      run: |
        flake8 tm1_git_py/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 tm1_git_py/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Check code formatting with black
      run: |
        black --check tm1_git_py/
      continue-on-error: true
    
    - name: Check import sorting with isort
      run: |
        isort --check-only tm1_git_py/
      continue-on-error: true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, integration-test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools wheel
    
    - name: Build package
      run: |
        python -m build
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
        retention-days: 7

