name: CI

on:
  #push:
  #  branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }} (ubuntu)
    runs-on: [self-hosted, linux, kseed-docker1]
    needs: [integration-test]
    defaults:
      run:
        shell: bash
        working-directory: repo
    container:
      image: python:${{ matrix.python-version }}-bookworm
      options: --user 1103:1103
    env:
      HOME: ${{ github.workspace }}/.home
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: repo
    
    - name: Prepare venv and install dependencies
      run: |
        mkdir -p "$HOME" "$PIP_CACHE_DIR"
        python -m venv .venv
        ./.venv/bin/python -m pip install --upgrade pip
        ./.venv/bin/python -m pip install -r requirements.txt
    
    - name: Run tests
      env:
        PYTHONPATH: .
      run: ./.venv/bin/python -m pytest tests/ -v --tb=short
    
    - name: Test import
      run: |
        ./.venv/bin/python -c "from tm1_git_py.config import load_tm1_servers; print('Import successful')"

  integration-test:
    name: Integration Tests
    runs-on: [self-hosted, linux, kseed-docker1]
    defaults:
      run:
        shell: bash
        working-directory: repo
    container:
      image: python:3.13-bookworm
      options: --volume /var/run/docker.sock:/var/run/docker.sock --volume /tmp:/host-tmp --add-host=host.docker.internal:host-gateway
    env:
      HOME: ${{ github.workspace }}/.home
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
      TM1_HOST: host.docker.internal
      TM1_COMPOSE_FILE: docker-compose.generated.yml
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: repo
    
    - name: Install dependencies
      run: |
        mkdir -p "$HOME" "$PIP_CACHE_DIR"
        python -m venv .venv
        ./.venv/bin/python -m pip install --upgrade pip
        ./.venv/bin/python -m pip install -r requirements.txt
        ./.venv/bin/python -m pip install pytest testcontainers

    - name: Install docker cli and compose plugin
      env:
        DOCKER_VERSION: "27.5.1"
        COMPOSE_VERSION: "v2.33.1"
      run: |
        mkdir -p .tools/bin "$HOME/.docker/cli-plugins"
        ./.venv/bin/python - <<'PY'
        import io
        import os
        import tarfile
        import urllib.request

        docker_url = f"https://download.docker.com/linux/static/stable/x86_64/docker-{os.environ['DOCKER_VERSION']}.tgz"
        compose_url = f"https://github.com/docker/compose/releases/download/{os.environ['COMPOSE_VERSION']}/docker-compose-linux-x86_64"

        with urllib.request.urlopen(docker_url) as resp:
            docker_tgz = resp.read()
        with tarfile.open(fileobj=io.BytesIO(docker_tgz), mode="r:gz") as archive:
            member = archive.getmember("docker/docker")
            target = os.path.join(".tools", "bin", "docker")
            with archive.extractfile(member) as src, open(target, "wb") as dst:
                dst.write(src.read())
        os.chmod(os.path.join(".tools", "bin", "docker"), 0o755)

        with urllib.request.urlopen(compose_url) as resp:
            compose_bin = resp.read()
        compose_target = os.path.join(os.environ["HOME"], ".docker", "cli-plugins", "docker-compose")
        with open(compose_target, "wb") as dst:
            dst.write(compose_bin)
        os.chmod(compose_target, 0o755)
        PY
        echo "${GITHUB_WORKSPACE}/repo/.tools/bin" >> "$GITHUB_PATH"

    - name: Select TM1 host port
      run: |
        set -euo pipefail
        base_port=$((20000 + (GITHUB_RUN_ID % 20000)))
        max_tries=40
        for i in $(seq 0 $((max_tries - 1))); do
          candidate=$((base_port + i))
          if [ "$candidate" -gt 59999 ]; then
            candidate=$((20000 + candidate - 60000))
          fi
          if docker ps --format '{{.Ports}}' | grep -Eq "(^|, )0\\.0\\.0\\.0:${candidate}->|\\[::\\]:${candidate}->"; then
            echo "TM1 port ${candidate} is busy, waiting..."
            sleep 2
            continue
          fi
          echo "TM1_PORT=${candidate}" >> "$GITHUB_ENV"
          echo "Using TM1_PORT=${candidate}"
          exit 0
        done
        echo "Could not find a free TM1 host port after ${max_tries} attempts" >&2
        exit 1

    - name: Select integration temp paths
      run: |
        tm1_tmp_base="/tmp/tm1-ci/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
        echo "TM1_TMP_BASE=${tm1_tmp_base}" >> "$GITHUB_ENV"
        echo "TM1MODELS_DIR=${tm1_tmp_base}/models" >> "$GITHUB_ENV"
        echo "TM1_COGSTARTUP_FILE=${tm1_tmp_base}/cogstartup.xml" >> "$GITHUB_ENV"
        echo "ARC_SETTINGS_FILE=${tm1_tmp_base}/settings.yml" >> "$GITHUB_ENV"
        echo "ARC_LICENSE_DIR=${tm1_tmp_base}/license" >> "$GITHUB_ENV"
        echo "Using TM1 temp base: ${tm1_tmp_base}"

    - name: Prepare compose defaults
      run: |
        host_tmp_base="/host-tmp${TM1_TMP_BASE#/tmp}"
        mkdir -p "${host_tmp_base}/models" "${host_tmp_base}/license"
        cp -a test_integration/fixture_model_tm1bin/. "${host_tmp_base}/models/"
        cp test_integration/cogstartup.xml "${host_tmp_base}/cogstartup.xml"
        if [ -f test_integration/settings.yml ]; then
          cp test_integration/settings.yml "${host_tmp_base}/settings.yml"
        else
          : > "${host_tmp_base}/settings.yml"
        fi
        cat > test_integration/docker-compose.ci.yml <<'YAML'
        services:
          tm1:
            volumes:
              - ${TM1MODELS_DIR}:/tm1models
              - ${TM1_COGSTARTUP_FILE}:/docker-entrypoint-initdb.d/cogstartup.xml
          arc:
            volumes:
              - ${ARC_SETTINGS_FILE}:/settings.yml
              - ${ARC_LICENSE_DIR}:/License
            ports: []
        YAML
        docker compose \
          -f test_integration/docker-compose.yml \
          -f test_integration/docker-compose.ci.yml \
          config > test_integration/docker-compose.generated.yml

    - name: Cleanup stale integration containers
      run: docker compose -f test_integration/${TM1_COMPOSE_FILE} down --remove-orphans || true

    - name: Wait before integration startup
      run: sleep 8

    - name: Run integration tests with retry
      env:
        PYTHONPATH: .
        FORCE_CONTAINER_START: 'true'
      run: |
        set -euo pipefail
        attempts=2
        for attempt in $(seq 1 "$attempts"); do
          echo "Integration test attempt ${attempt}/${attempts}"
          if ./.venv/bin/python -m pytest test_integration/ -v --tb=short; then
            exit 0
          fi
          docker compose -f test_integration/${TM1_COMPOSE_FILE} ps -a || true
          docker compose -f test_integration/${TM1_COMPOSE_FILE} logs --no-color tm1 arc || true
          docker compose -f test_integration/${TM1_COMPOSE_FILE} down --remove-orphans || true
          if [ "$attempt" -lt "$attempts" ]; then
            sleep 12
          fi
        done
        exit 1

    - name: Dump integration compose logs on failure
      if: failure()
      run: |
        docker compose -f test_integration/${TM1_COMPOSE_FILE} ps -a || true
        docker compose -f test_integration/${TM1_COMPOSE_FILE} logs --no-color tm1 arc || true

    - name: Cleanup integration containers
      if: always()
      run: docker compose -f test_integration/${TM1_COMPOSE_FILE} down --remove-orphans || true

    - name: Restore workspace ownership
      if: always()
      run: chown -R 1103:1103 "${GITHUB_WORKSPACE}/repo" "${GITHUB_WORKSPACE}/.home" "${GITHUB_WORKSPACE}/.pip-cache" || true

    - name: Cleanup integration temp files
      if: always()
      run: rm -rf "/host-tmp${TM1_TMP_BASE#/tmp}" || true

  lint:
    name: Lint and Code Quality
    runs-on: [self-hosted, linux, kseed-docker1]
    needs: [integration-test]
    defaults:
      run:
        shell: bash
        working-directory: repo
    container:
      image: python:3.11-bookworm
      options: --user 1103:1103
    env:
      HOME: ${{ github.workspace }}/.home
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: repo
    
    - name: Install dependencies
      run: |
        mkdir -p "$HOME" "$PIP_CACHE_DIR"
        python -m venv .venv
        ./.venv/bin/python -m pip install --upgrade pip
        ./.venv/bin/python -m pip install flake8 black isort mypy
        ./.venv/bin/python -m pip install -r requirements.txt
    
    - name: Run flake8
      run: |
        ./.venv/bin/python -m flake8 tm1_git_py/ --count --select=E9,F63,F7,F82 --show-source --statistics
        ./.venv/bin/python -m flake8 tm1_git_py/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Check code formatting with black
      run: |
        ./.venv/bin/python -m black --check tm1_git_py/
      continue-on-error: true
    
    - name: Check import sorting with isort
      run: |
        ./.venv/bin/python -m isort --check-only tm1_git_py/
      continue-on-error: true

  build:
    name: Build Package
    runs-on: [self-hosted, linux, kseed-docker1]
    needs: [test, integration-test, lint]
    defaults:
      run:
        shell: bash
        working-directory: repo
    container:
      image: python:3.11-bookworm
      options: --user 1103:1103
    env:
      HOME: ${{ github.workspace }}/.home
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: repo
    
    - name: Install build dependencies
      run: |
        mkdir -p "$HOME" "$PIP_CACHE_DIR"
        python -m venv .venv
        ./.venv/bin/python -m pip install --upgrade pip
        ./.venv/bin/python -m pip install build setuptools wheel
    
    - name: Build package
      run: |
        ./.venv/bin/python -m build
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: repo/dist/
        retention-days: 7

