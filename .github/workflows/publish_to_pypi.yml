name: Publish To PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build and publish from (e.g. main, develop, v1.2.0)"
        required: true
        default: main
        type: string
      version:
        description: "Package version (PEP 440), e.g. 1.2.0 — written to __version__ before build"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve checkout ref and package version
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          WF_REF: ${{ inputs.ref }}
          WF_VERSION: ${{ inputs.version }}
          RELEASE_REF: ${{ github.ref }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "ref=$WF_REF" >> "$GITHUB_OUTPUT"
            ver="$WF_VERSION"
          else
            echo "ref=$RELEASE_REF" >> "$GITHUB_OUTPUT"
            ver="$RELEASE_TAG"
          fi
          # Strip optional leading "v" (e.g. release tag v1.2.0 → 1.2.0)
          ver="${ver#v}"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Update version in package
        run: python -c "from tm1_git_py.__init__ import update_version; update_version('${{ steps.meta.outputs.version }}')"

      - name: Build
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI
        run: python -m twine upload dist/* -u__token__ -p${{ secrets.PYPI_TOKEN }} --non-interactive --verbose
