        # Metadata code here
      epilog: >-
        # Epilog code here

  - change_type: add
    object_type: Chore
    source_path: chores/mychore.json
    body:
      name: mychore
      active: false
      start_date: "2024-01-01"
      dst_sensitive: false,
      execution_mode: "SingleCommit"
      frequency: "P01DT00H00M00S"
      tasks:
        - processes/myprocess.json
        - processes/myprocess2.json

  - change_type: modify
    object_type: Chore
    source_path: chores/mychore2.json
    body:
      name: mychore2
      active: false
      start_date: "2024-01-01"
      dst_sensitive: false,
      execution_mode: "SingleCommit"
      frequency: "P02DT00H00M00S"
