changeset_id: null
summary:
  add: 11
  remove: 10
  modify: 7
changes:
# First DELETE: Cube subtree -> Dimension subtree -> Chores -> Processes
  - change_type: remove
    object_type: MDXView
    source_path: cubes/old_cube.views/old_view_add.json
    body:
      name: old_view_add

  - change_type: remove
    object_type: Rule
    source_path: cubes/old_cube.rules
    body:
      name: default

  - change_type: remove
    object_type: Cube
    source_path: cubes/mycube.json
    body:
      name: TestCube2WithRule

  - change_type: remove
    object_type: Subset
    source_path: dimensions/old_dim.hierarchies/old_hier.subsets/old_subset.json
    body:
      name: old_subset

  - change_type: remove
    object_type: Edge
    source_path: dimensions/old_dim.hierarchies/old_hier.edges/old_elem1:old_elem2
    body:
      name: old_elem1:old_elem2

  - change_type: remove
    object_type: Element
    source_path: dimensions/old_dim.hierarchies/old_hier.json/old_elem1
    body:
      name: old_elem1

  - change_type: remove
    object_type: Hierarchy
    source_path: dimensions/old_dim.hierarchies/old_hier.json
    body:
      name: old_hier

  - change_type: remove
    object_type: Dimension
    source_path: dimensions/old_dim.json
    body:
      name: old_dim

  - change_type: remove
    object_type: Chore
    source_path: chores/old_chore.json
    body:
      name: old_chore

  - change_type: remove
    object_type: Process
    source_path: processes/old_process.json
    body:
      name: old_process2

# SECOND: Add Dimension subtree: create dim /w empty hier -> add hier -> add elements, edges, subsets
# Updating the Dimension subtree follows the same precedence
  - change_type: add
    object_type: Dimension
    source_path: dimensions/mydim.json
    body:
      name: mydim
      hierarchies:
        - dimensions/mydim.hierarchies/myhier.json
      default_hierarchy: dimensions/mydim.hierarchies/myhier.json

  - change_type: add
    object_type: Hierarchy
    source_path: dimensions/mydim.hierarchies/myhier.json
    body:
      name: mydim

  - change_type: add
    object_type: Element
    source_path: dimensions/mydim.hierarchies/myhier.json/myelem1
    body:
      Name: myelem1
      Type: Numeric

  - change_type: add
    object_type: Element
    source_path: dimensions/mydim.hierarchies/myhier.json/myelem2
    body:
      Name: myelem2
      Type: Numeric

  - change_type: add
    object_type: Edge
    source_path: dimensions/mydim.hierarchies/myhier.json/myelem1:myelem2
    body:
      ParentName: myelem1
      ComponentName: myelem2
      Weight: 1

  - change_type: add
    object_type: Subset
    source_path: dimensions/mydim.hierarchies/myhier.subsets/mysubset.json
    body:
      name: mysubset
      expression: >-
        {[mydim].[myhier].Members}

  - change_type: modify
    object_type: Dimension
    source_path: dimensions/mydim.json
    body:
      name: mod_dim
      hierarchies:
        - dimensions/mydim.hierarchies/myhier.json
        - dimensions/mydim.hierarchies/myhier2.json
      default_hierarchy: dimensions/mydim.hierarchies/myhier.json

#   HIERARCHY UPDATE NOT DEFINED: modification is handled by children for add/remove
#  - change_type: modify
#    object_type: Hierarchy
#    source_path: dimensions/mydim.hierarchies/myhier.json
#    body:
#      name: mydim

#   ELEMENT UPDATE NOT DEFINED: cannot change neither name nor type, only add/remove
#  - change_type: modify
#    object_type: Element
#    source_path: dimensions/mydim.hierarchies/myhier.json/myelem2
#    body:
#      name: myelem2
#      type: Numeric

  - change_type: modify
    object_type: Edge
    source_path: dimensions/mydim.hierarchies/myhier.json/myelem1:myelem2
    body:
      ParentName: myelem1
      ComponentName: myelem2
      Weight: 0

  - change_type: modify
    object_type: Subset
    source_path: dimensions/mydim.hierarchies/myhier.subsets/mysubset2.json
    body:
      name: mysubset2
      expression: >-
        {[mydim].[myhier].Leaves}

# THIRD: Add and Update Cube subtree
  - change_type: add
    object_type: Cube
    source_path: cubes/mycube.json
    body:
      name: TestCube2WithRule
      dimensions:
        # Probably we could reference dimensions using their source_path
        - dimensions/mydim1.json
        - dimensions/mydim2.json
        # This was the original way to reference dimensions
        # - "@id": "Dimensions('mydim1')"
        # - "@id": "Dimensions('mydim2')"

  - change_type: add
    object_type: Rule
    source_path: cubes/mycube.rules
    body:
      # Rule doesn't have implicit name unless we start defining subrules referenced by name.
      name: default
      rule: >-
        SKIPCHECK;
        ['TestDim1'] = N: 1;
        ['TestDim2'] = N: 1;

  # - change_type: add
  #   object_type: Rule
  #   source_path: cubes/mycube.rules/mysubrule1
  #   body:
  #     # Rule doesn't have implicit name unless we start defining subrules referenced by name.
  #     name: mysubrule1
  #     rule: >-
  #       SKIPCHECK;
  #       ['TestDim1'] = N: 1;

  # - change_type: add
  #   object_type: Rule
  #   source_path: cubes/mycube.rules/mysubrule2
  #   body:
  #     # Rule doesn't have implicit name unless we start defining subrules referenced by name.
  #     name: mysubrule2
  #     rule: >-
  #       ['TestDim2'] = N: 1;

  - change_type: add
    object_type: MDXView
    source_path: cubes/mycube.views/myview_add.json
    body:
      name: myview_add
      mdx: >-
        SELECT NON EMPTY {[mydim].[myhier].Members} ON 0
        FROM [mycube]

  # CUBE UPDATE NOT DEFINED NATIVELY, ONLY WITH TM1_BEDROCK_PY
  # - change_type: modify
  #   object_type: Cube
  #   #source_path: cubes/mycube.json
  #   body:
  #     name: TestCube2WithRule
  #     dimensions:
  #       - "@id": "Dimensions('mydim1')"
  #       - "@id": "Dimensions('mydim2')"

  - change_type: modify
    object_type: Rule
    source_path: cubes/mycube.rules
    body:
      name: default
      rule: >-
        SKIPCHECK;
        ['TestDim1'] = N: 1;
        ['TestDim2'] = N: 1;
        ['TestDim3'] = N: 1;

  - change_type: modify
    object_type: MDXView
    source_path: cubes/mycube.views/myview.json
    body:
      name: myview
      mdx: >-
        SELECT NON EMPTY {[TestDim2].[TestDim2].Members} DIMENSION PROPERTIES MEMBER_NAME ON 0,
        NON EMPTY {[TestDim1].[TestDim1].Members} DIMENSION PROPERTIES MEMBER_NAME ON 1
        FROM [testcube3withview]

# Last: Add and Update Processes then Chores: only trough API calls, cannot be translated to TI
